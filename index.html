<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Steel Global - Explore</title>
    <!-- Favicon brand - Steel -->
    <link rel="icon" type="image/png" href="assets/logos/Steel Logo - Transparent.png">

    <link rel="stylesheet" href="styles.css?v=9">

    <!-- Three.js for 3D backgrounds (AI World) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <!-- OGL Library (for Steel Cinema & Galaxy Worlds) -->
    <script type="module">
        import * as oglModule from 'https://unpkg.com/ogl@1.0.11/src/index.js';
        window.ogl = oglModule;
    </script>

    <!-- Fonts: Outfit for a modern, clean, tech/industrial feel -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400;600&display=swap" rel="stylesheet">
</head>

<body>
    <!-- Top Left Logo Container -->
    <div class="logo-container" style="position: fixed; top: 30px; left: 30px; z-index: 1000;">
        <!-- Logo: Steel Global Logo. -->
        <img src="assets/logos/STEEL GLOBAL - Transparent.png" alt="Steel Global" class="brand-logo img-protected"
            draggable="false" onclick="toggleCompass()" style="width: 140px;">
    </div>

    <!-- Main 3D Viewport -->
    <div id="viewport">
        <!-- Voice of Steel (Concierge Layer) -->
        <div id="voice-of-steel"
            style="position: absolute; bottom: 12%; width: 100%; text-align: center; color: rgba(255, 255, 255, 0.8); font-family: var(--font-main); font-size: 1rem; letter-spacing: 2px; text-transform: uppercase; font-weight: 300; opacity: 0; transition: opacity 1.5s ease-in-out; pointer-events: none; z-index: 100;">
        </div>

        <!-- Shooting Stars Layer (Background 2D, moved behind Gargantua) -->
        <canvas id="shooting-stars"
            style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: -20;"></canvas>

        <!-- Gargantua Base Canvas (Persistent) -->
        <div id="gargantua-canvas-container"></div>
        <div id="warp-flash"></div>

        <!-- Background Layer (Destination State) -->
        <div id="background-layer">

            <!-- Default Nexus Background: Frozen Low-Density Galaxy -->
            <div id="world-nexus" class="world-layer active"></div>

            <!-- Business World: Animated Gradient -->
            <div id="world-business" class="world-layer">
                <div class="blob blob-1"></div>
                <div class="blob blob-2"></div>
                <div class="blob blob-3"></div>
                <div class="blob blob-4"></div>
                <!-- Animated Grid Overlay -->
                <div id="business-grid"></div>
            </div>

            <!-- AI World: Light Pillars -->
            <div id="world-ai" class="world-layer" style="mix-blend-mode: luminosity;"></div>

            <!-- Steel Cinema World: Plasma -->
            <div id="world-steel-cinema" class="world-layer"></div>

            <!-- Culture World: Organic Glow -->
            <div id="world-culture" class="world-layer">
                <div class="culture-glow"></div>
            </div>

            <!-- Galaxy Placeholder World -->
            <div id="world-galaxy" class="world-layer"></div>
        </div>

        <!-- The Universe: The outer container that manages Warp Translations & Macro-Pan -->
        <div id="universe">
            <!-- The inner layer: Instantly manages Mouse & Gyro Micro-movements -->
            <div id="universe-micro">

                <!-- The Nebula / Fog Layer -->
                <div id="nebula"></div>

                <!-- Center / Title -->
                <div class="explore-item" data-x="0" data-y="0" data-z="0">
                    <h1 class="main-title">STEEL<br>GLOBAL</h1>
                    <p class="tagline">Curating the Unimagined</p>
                </div>

                <!-- 'The Infinite Sky' Topics scattered in 3D space -->

                <!-- Business: Mid Right, somewhat far (-500) -->
                <div class="explore-item topic" data-x="400" data-y="-100" data-z="-500">
                    <span class="topic-label">Business</span>
                </div>

                <!-- Design: Close, Bottom Left (-200) -->
                <div class="explore-item topic" data-x="-300" data-y="200" data-z="-200">
                    <span class="topic-label">Design</span>
                </div>

                <!-- Culture: Far Back Left (-1500) -->
                <div class="explore-item topic" data-x="-500" data-y="-300" data-z="-1500">
                    <span class="topic-label">Culture</span>
                </div>

                <!-- Populating More -->

                <!-- Photography: Top Right, Deep (-1800) -->
                <div class="explore-item topic" data-x="600" data-y="-400" data-z="-1800">
                    <span class="topic-label">Photography</span>
                </div>

                <!-- Philosophy: Bottom Right, Very Close (-100) - almost in face -->
                <div class="explore-item topic" data-x="350" data-y="300" data-z="-100">
                    <span class="topic-label">Philosophy</span>
                </div>

                <!-- Videography: Mid Left, Medium (-800) -->
                <div class="explore-item topic" data-x="-600" data-y="0" data-z="-800">
                    <span class="topic-label">Videography</span>
                </div>

                <!-- AI: Top Left, Very Deep (-3000) -->
                <div class="explore-item topic" data-x="-800" data-y="-600" data-z="-3000">
                    <span class="topic-label">AI</span>
                </div>

                <!-- Futurism: Bottom Center, Deep (-2500) -->
                <div class="explore-item topic" data-x="0" data-y="500" data-z="-2500">
                    <span class="topic-label">Futurism</span>
                </div>

                <!-- Modernism: Top Center, Mid (-1200) -->
                <div class="explore-item topic" data-x="0" data-y="-500" data-z="-1200">
                    <span class="topic-label">Modernism</span>
                </div>

                <!-- Charity: Far Right, Deep (-2200) -->
                <div class="explore-item topic" data-x="900" data-y="100" data-z="-2200">
                    <span class="topic-label">Charity</span>
                </div>

                <!-- Steel Cinema: Far Left, Deep (-1600) -->
                <div class="explore-item topic" data-x="-700" data-y="200" data-z="-1600">
                    <span class="topic-label">Steel Cinema</span>
                </div>

                <!-- Sonic Arts: Bottom Left, Deep (-2800) -->
                <div class="explore-item topic" data-x="-400" data-y="700" data-z="-2800">
                    <span class="topic-label">Sonic Arts</span>
                </div>

                <!-- Fashion: Top Right, Mid-Deep (-1400) -->
                <div class="explore-item topic" data-x="500" data-y="-200" data-z="-1400">
                    <span class="topic-label">Fashion</span>
                </div>

                <!-- STEEL CARD: Center Left, Close-ish (-400) -->
                <div class="explore-item topic" data-x="-400" data-y="-100" data-z="-400">
                    <span class="topic-label">STEEL CARD</span>
                </div>

                <!-- Ventures: Center Right, Deep (-2000) -->
                <div class="explore-item topic" data-x="400" data-y="-50" data-z="-2000">
                    <span class="topic-label">Ventures</span>
                </div>

            </div>
        </div>
    </div>

    <!-- Ambient background element -->
    <div class="ambient-glow"></div>

    <script>
        // --- The Universe Engine ---
        const universe = document.getElementById('universe');
        const items = document.querySelectorAll('.explore-item');
        const backgroundLayer = document.getElementById('background-layer');

        // State
        let currentX = 0;
        let currentY = 0;
        let currentZ = 0;
        let activeWorld = null; // Track current active world
        let macroRotX = 0;
        let macroRotY = 0;
        let currentMouseRotX = 0;
        let currentMouseRotY = 0;
        let targetMouseRotX = 0;
        let targetMouseRotY = 0;

        const universeMicro = document.getElementById('universe-micro');

        function updateUniverseTransform() {
            // Smooth outer container for Destination Warps and Macro Pans
            universe.style.transform = `
                translate3d(${currentX}px, ${currentY}px, ${currentZ}px) 
                rotateX(${macroRotX}deg) 
                rotateY(${macroRotY}deg)
            `;

            // Instant inner container for responsive Mouse/Gyro Parallax
            if (universeMicro) {
                universeMicro.style.transform = `
                    rotateX(${currentMouseRotX}deg) 
                    rotateY(${currentMouseRotY}deg)
                `;
            }

            // Apply the same subtle parallax to Gargantua so it feels physically anchored
            const gargantuaContainer = document.getElementById('gargantua-canvas-container');
            if (gargantuaContainer) {
                if (document.body.classList.contains('foundry-route') || gargantuaContainer.classList.contains('warp-zoom')) {
                    // Clear inline style so the CSS scale transform can run
                    gargantuaContainer.style.transform = '';
                } else {
                    // Translate slightly based on the rotation degrees to match the parallax feel
                    gargantuaContainer.style.transform = `translate3d(${currentMouseRotY * 1.5}px, ${-currentMouseRotX * 1.5}px, 0)`;
                }
            }
        }

        // rAF loop for buttery smooth micro-movements (eliminates ghosting/duplication on gyro and smooths desktop mouse)
        function updateMicroMovements() {
            // Deskto/Gyro LERP (Linear Interpolate) current rotation towards target
            // We use a gentle LERP factor (0.05) to bring back the "smooth subtle pan" feel
            currentMouseRotX += (targetMouseRotX - currentMouseRotX) * 0.05;
            currentMouseRotY += (targetMouseRotY - currentMouseRotY) * 0.05;

            updateUniverseTransform();
            requestAnimationFrame(updateMicroMovements);
        }
        requestAnimationFrame(updateMicroMovements);

        // 1. Initial Setup: Position everything visually
        items.forEach(item => {
            const x = parseInt(item.dataset.x);
            const y = parseInt(item.dataset.y);
            const z = parseInt(item.dataset.z);

            // Random Rotation for topics only, not the main title
            let rotX = 0;
            let rotY = 0;
            let rotZ = 0;

            if (item.classList.contains('topic')) {
                // Random Rotation for "Floating in Space" feel
                rotX = (Math.random() * 20) - 10; // -10 to 10 deg
                rotY = (Math.random() * 20) - 10;
                rotZ = (Math.random() * 10) - 5;  // Subtle Z tilt
            }

            // Depth Fading Logic
            // If deeper than -2000, fade out. scale min opacity to 0.3
            let opacity = 1;
            if (z < -2000) {
                // Map -2000 -> 1, -4000 -> 0.3
                const depth = Math.abs(z);
                opacity = 1 - ((depth - 2000) / 3000);
                if (opacity < 0.3) opacity = 0.3;
            }
            item.style.opacity = opacity;


            // Apply coordinates directly to the element
            item.style.transform = `translate3d(${x}px, ${y}px, ${z}px) rotateX(${rotX}deg) rotateY(${rotY}deg) rotateZ(${rotZ}deg)`;

            // Store original random rotation to re-apply it if needed (optional, simplistic for now)
            item.dataset.rotX = rotX;
            item.dataset.rotY = rotY;
            item.dataset.rotZ = rotZ;
        });

        // 2. Parallax / Mouse Look (Subtle drift)
        document.addEventListener('mousemove', (e) => {
            // Only apply subtle drift if not warping (optional, but cleaner)
            const xPct = (e.clientX / window.innerWidth) - 0.5;
            const yPct = (e.clientY / window.innerHeight) - 0.5;

            // Rotate the entire universe slightly based on mouse
            // We use rotateY and rotateX for that "looking around" feel
            targetMouseRotX = -yPct * 5; // deg
            targetMouseRotY = xPct * 5; // deg

            // The loop handles updating currentMouseRotX/Y smoothly
        });

        // 3. The Warp Drive (Navigation)
        document.querySelectorAll('.topic').forEach(topic => {
            topic.addEventListener('click', (e) => {
                const topicName = topic.innerText.trim(); // Get topic name
                console.log('Clicked topic:', topicName, topic.dataset); // DEBUG

                // Get destination coordinates
                // We want to move the UNIVERSE so that the target item ends up at (0,0,0) or slightly offset
                // So Universe Translation = -1 * Item Position

                const targetX = -parseInt(topic.dataset.x);
                const targetY = -parseInt(topic.dataset.y);
                const targetZ = -parseInt(topic.dataset.z);

                console.log('Target coordinates:', { targetX, targetY, targetZ }); // DEBUG

                // Update state
                currentX = targetX;
                currentY = targetY;
                // Add a small offset to Z so we don't clip INSIDE the text, maybe stop 50px in front
                currentZ = targetZ + 100;

                // Reset any macro pan and apply Warp
                macroRotX = 0;
                macroRotY = 0;
                updateUniverseTransform();

                // --- Visual Hierarchy: Dim Others ---
                items.forEach(el => {
                    if (el === topic) {
                        el.classList.remove('dimmed');
                        el.classList.add('active');
                    } else {
                        el.classList.add('dimmed');
                        el.classList.remove('active');
                    }
                });

                // Optional: Add a class to indicate "arrived" state for styling changes
                document.body.classList.add('warping');

                // --- Destination State Controller ---
                // Wait for warp to almost finish (2.0s transition -> trigger at 2.0s)
                setTimeout(() => {
                    document.body.classList.remove('warping');
                    document.body.classList.add('at-destination');

                    // Activate specific World
                    if (topicName.toUpperCase() === 'BUSINESS') {
                        activateWorld('world-business');
                    } else if (topicName.toUpperCase() === 'AI') {
                        if (typeof initAIWorld === 'function') initAIWorld();
                        activateWorld('world-ai');
                    } else if (topicName.toUpperCase() === 'STEEL CINEMA') {
                        if (typeof initSteelCinemaWorld === 'function') initSteelCinemaWorld();
                        activateWorld('world-steel-cinema');
                    } else if (topicName.toUpperCase() === 'CULTURE') {
                        activateWorld('world-culture');
                    } else {
                        // Placeholder Galaxy World Theme for all unassigned topics
                        if (typeof initGalaxyWorld === 'function') initGalaxyWorld();
                        activateWorld('world-galaxy');
                    }

                }, 2000); // Match transition duration (2.0s delay + 0.5s fade in CSS)
            });
        });

        // Helper: Activate a world
        function activateWorld(worldId) {
            clearWorlds(); // Clear existing
            const worldEl = document.getElementById(worldId);
            if (worldEl) {
                // Small delay to ensure smooth transition start
                setTimeout(() => {
                    worldEl.classList.add('active');
                    activeWorld = worldId;
                }, 100);
            }
        }

        // Helper: Clear all worlds
        function clearWorlds() {
            document.querySelectorAll('.world-layer').forEach(layer => {
                layer.classList.remove('active');
            });

            // Reactivate base frozen Nexus so it sits permanently beneath all other worlds for depth
            const nexus = document.getElementById('world-nexus');
            if (nexus) nexus.classList.add('active');

            // Delayed disposal so canvases can fade out smoothly via CSS alongside everything else
            setTimeout(() => {
                const ai = document.getElementById('world-ai');
                if (ai && !ai.classList.contains('active') && typeof disposeAIWorld === 'function') {
                    disposeAIWorld();
                }
                const sc = document.getElementById('world-steel-cinema');
                if (sc && !sc.classList.contains('active') && typeof disposeSteelCinemaWorld === 'function') {
                    disposeSteelCinemaWorld();
                }
                const gx = document.getElementById('world-galaxy');
                if (gx && !gx.classList.contains('active') && typeof disposeGalaxyWorld === 'function') {
                    disposeGalaxyWorld();
                }
            }, 2000); // match fade transition
        }

        // Reset view helper
        function resetToNexus() {
            currentX = 0;
            currentY = 0;
            currentZ = 0;
            macroRotX = 0;
            macroRotY = 0;
            updateUniverseTransform();
            document.body.classList.remove('at-destination');

            // Restore Opacity
            items.forEach(el => {
                el.classList.remove('dimmed');
                el.classList.remove('active');
            });

            // Clear World Backgrounds
            clearWorlds();
        }

        // Reset view when clicking Main Title (Home)
        document.querySelector('.main-title').addEventListener('click', () => {
            resetToNexus();
        });

        // --- Task 3: Macro-Pan Controller ---
        const panAngles = [
            { rx: 0, ry: 0 },   // Center
            { rx: 10, ry: 35 }, // Up Right
            { rx: -15, ry: -40 }, // Down Left
            { rx: 5, ry: -35 },  // Up Left
            { rx: -10, ry: 45 }  // Down Right
        ];
        let panIndex = 0;

        function triggerMacroPan() {
            panIndex = (panIndex + 1) % panAngles.length;
            macroRotX = panAngles[panIndex].rx;
            macroRotY = panAngles[panIndex].ry;
            updateUniverseTransform();
            console.log("Macro Pan triggered:", panIndex, macroRotX, macroRotY);
        }

        // Active Double-Tap for Background
        let lastTapTime = 0;
        backgroundLayer.addEventListener('touchend', (e) => {
            if (document.body.classList.contains('warping')) return;

            const currentTime = new Date().getTime();
            const tapLength = currentTime - lastTapTime;

            if (tapLength < 400 && tapLength > 0) {
                // Double tap detected
                triggerMacroPan();
                e.preventDefault();
            } else if (activeWorld === null || activeWorld === 'world-nexus') {
                // Single tap on empty space if at Nexus
                // Delay slightly to confirm it's not a double tap
                setTimeout(() => {
                    const newTapLength = new Date().getTime() - lastTapTime;
                    if (newTapLength >= 400 && activeWorld === null || activeWorld === 'world-nexus') {
                        triggerMacroPan();
                    }
                }, 400);
            } else {
                // Return to nexus normally on click (handled by click event below, but for mobile touch:)
                // Actually touchend might fire click as well. We'll rely on the existing click event to return to Nexus.
            }
            lastTapTime = currentTime;
        });

        // Background Controller: Return to Nexus on Void Click
        backgroundLayer.addEventListener('click', (e) => {
            // Guard against "ghost clicks" on mobile that trigger immediately after tapping a topic
            if (document.body.classList.contains('warping')) {
                return;
            }

            // Task 3 addition: If we are at the Nexus, single tap macro-pans (desktop click)
            if (activeWorld === null || activeWorld === 'world-nexus') {
                // The double tap logic handles mobile. For desktop click, just trigger it:
                if (e.pointerType === "mouse") {
                    triggerMacroPan();
                }
                return;
            }

            console.log('Background clicked -> Returning to Nexus');
            resetToNexus();
        });


        // Image Protection
        document.querySelectorAll('.img-protected').forEach(img => {
            img.addEventListener('contextmenu', e => e.preventDefault());
            img.addEventListener('dragstart', e => e.preventDefault());
        });

    </script>

    <!-- Gargantua Singularity Engine -->
    <script type="module">
        import { initGargantua } from './gargantua.js?v=9';

        // Initialize Gargantua on load
        window.addEventListener('DOMContentLoaded', () => {
            initGargantua();
        });
    </script>

    <!-- AI World (LightPillars) Engine -->
    <script>
        let aiRenderer = null;
        let aiScene = null;
        let aiCamera = null;
        let aiMaterial = null;
        let aiGeometry = null;
        let aiRafId = null;

        function initAIWorld() {
            const container = document.getElementById('world-ai');
            if (!container) return;

            // If already initialized, do nothing
            if (aiRenderer) return;

            const width = container.clientWidth;
            const height = container.clientHeight;

            aiScene = new THREE.Scene();
            aiCamera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);

            try {
                aiRenderer = new THREE.WebGLRenderer({
                    antialias: false,
                    alpha: true,
                    powerPreference: 'high-performance',
                    precision: 'highp',
                    stencil: false,
                    depth: false
                });
            } catch (error) {
                console.error("WebGL not supported for AI World");
                return;
            }

            aiRenderer.setSize(width, height);
            aiRenderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            container.appendChild(aiRenderer.domElement);

            const vertexShader = `
              varying vec2 vUv;
              void main() {
                vUv = uv;
                gl_Position = vec4(position, 1.0);
              }
            `;

            // Define custom tanh replacement for compatibility with standard GLSL ES 1.0
            const fragmentShader = `
              precision highp float;

              uniform float uTime;
              uniform vec2 uResolution;
              uniform vec2 uMouse;
              uniform vec3 uTopColor;
              uniform vec3 uBottomColor;
              uniform float uIntensity;
              uniform bool uInteractive;
              uniform float uGlowAmount;
              uniform float uPillarWidth;
              uniform float uPillarHeight;
              uniform float uNoiseIntensity;
              uniform float uRotCos;
              uniform float uRotSin;
              uniform float uPillarRotCos;
              uniform float uPillarRotSin;
              uniform float uWaveSin;
              uniform float uWaveCos;
              varying vec2 vUv;

              const float STEP_MULT = 1.0;
              const int MAX_ITER = 60;
              const int WAVE_ITER = 3;

              vec3 my_tanh(vec3 x) {
                  vec3 e = exp(2.0 * x);
                  return (e - 1.0) / (e + 1.0);
              }

              void main() {
                vec2 uv = (vUv * 2.0 - 1.0) * vec2(uResolution.x / uResolution.y, 1.0);
                uv = vec2(uPillarRotCos * uv.x - uPillarRotSin * uv.y, uPillarRotSin * uv.x + uPillarRotCos * uv.y);

                vec3 ro = vec3(0.0, 0.0, -10.0);
                vec3 rd = normalize(vec3(uv, 1.0));

                float rotC = uRotCos;
                float rotS = uRotSin;
                if(uInteractive && (uMouse.x != 0.0 || uMouse.y != 0.0)) {
                  float a = uMouse.x * 6.283185;
                  rotC = cos(a);
                  rotS = sin(a);
                }

                vec3 col = vec3(0.0);
                float t = 0.1;
                
                for(int i = 0; i < MAX_ITER; i++) {
                  vec3 p = ro + rd * t;
                  p.xz = vec2(rotC * p.x - rotS * p.z, rotS * p.x + rotC * p.z);

                  vec3 q = p;
                  q.y = p.y * uPillarHeight + uTime;
                  
                  float freq = 1.0;
                  float amp = 1.0;
                  for(int j = 0; j < WAVE_ITER; j++) {
                    q.xz = vec2(uWaveCos * q.x - uWaveSin * q.z, uWaveSin * q.x + uWaveCos * q.z);
                    q += cos(q.zxy * freq - uTime * float(j) * 2.0) * amp;
                    freq *= 2.0;
                    amp *= 0.5;
                  }
                  
                  float d = length(cos(q.xz)) - 0.2;
                  float bound = length(p.xz) - uPillarWidth;
                  float k = 4.0;
                  float h = max(k - abs(d - bound), 0.0);
                  d = max(d, bound) + h * h * 0.0625 / k;
                  d = abs(d) * 0.15 + 0.01;

                  float grad = clamp((15.0 - p.y) / 30.0, 0.0, 1.0);
                  col += mix(uBottomColor, uTopColor, grad) / d;

                  t += d * STEP_MULT;
                  if(t > 50.0) break;
                }

                float widthNorm = uPillarWidth / 3.0;
                col = my_tanh(col * uGlowAmount / widthNorm);
                
                col -= fract(sin(dot(gl_FragCoord.xy, vec2(12.9898, 78.233))) * 43758.5453) / 15.0 * uNoiseIntensity;
                
                gl_FragColor = vec4(col * uIntensity, 1.0);
              }
            `;

            // Settings from prompt
            const topColor = new THREE.Vector3(1, 1, 1); // #ffffff
            const bottomColor = new THREE.Vector3(0, 0, 0); // #000000
            const pillarRotation = 64;
            const pillarRotRad = (pillarRotation * Math.PI) / 180;
            const waveSin = Math.sin(0.4);
            const waveCos = Math.cos(0.4);

            aiMaterial = new THREE.ShaderMaterial({
                vertexShader,
                fragmentShader,
                uniforms: {
                    uTime: { value: 0 },
                    uResolution: { value: new THREE.Vector2(width, height) },
                    uMouse: { value: new THREE.Vector2(0, 0) },
                    uTopColor: { value: topColor },
                    uBottomColor: { value: bottomColor },
                    uIntensity: { value: 1.0 },
                    uInteractive: { value: false },
                    uGlowAmount: { value: 0.002 },
                    uPillarWidth: { value: 3.0 },
                    uPillarHeight: { value: 0.4 },
                    uNoiseIntensity: { value: 0.6 },
                    uRotCos: { value: 1.0 },
                    uRotSin: { value: 0.0 },
                    uPillarRotCos: { value: Math.cos(pillarRotRad) },
                    uPillarRotSin: { value: Math.sin(pillarRotRad) },
                    uWaveSin: { value: waveSin },
                    uWaveCos: { value: waveCos }
                },
                transparent: true,
                depthWrite: false,
                depthTest: false
            });

            aiGeometry = new THREE.PlaneGeometry(2, 2);
            const mesh = new THREE.Mesh(aiGeometry, aiMaterial);
            aiScene.add(mesh);

            let lastTime = performance.now();
            let aiTime = 0;
            const frameTime = 1000 / 60;

            const animate = currentTime => {
                if (!aiMaterial || !aiRenderer) return;

                const deltaTime = currentTime - lastTime;
                if (deltaTime >= frameTime) {
                    aiTime += 0.016 * 0.3; // rotationSpeed = 0.3
                    aiMaterial.uniforms.uTime.value = aiTime;

                  float hue = atan(base.g - base.r, base.b - base.r) / (2.0 * 3.14159) + 0.5;
                  hue = fract(hue + uHueShift / 360.0);
                  float sat = length(base - vec3(dot(base, vec3(0.299, 0.587, 0.114)))) * uSaturation;
                  float val = max(max(base.r, base.g), base.b);
                  base = hsv2rgb(vec3(hue, sat, val));

                  vec2 pad = vec2(tris(seed * 34.0 + uTime * uSpeed / 10.0), tris(seed * 38.0 + uTime * uSpeed / 30.0)) - 0.5;
                  float star = Star(gv - offset - pad, flareSize);
                  vec3 color = base;
                  float twinkle = trisn(uTime * uSpeed + seed * 6.2831) * 0.5 + 1.0;
                  twinkle = mix(1.0, twinkle, uTwinkleIntensity);
                  star *= twinkle;
                  col += star * size * color;
                }
              }
              return col;
            }

            void main() {
              vec2 focalPx = uFocal * uResolution.xy;
              vec2 uv = (vUv * uResolution.xy - focalPx) / uResolution.y;
              vec2 mouseNorm = uMouse - vec2(0.5);
              
              if (uAutoCenterRepulsion > 0.0) {
                vec2 centerUV = vec2(0.0, 0.0);
                float centerDist = length(uv - centerUV);
                vec2 repulsion = normalize(uv - centerUV) * (uAutoCenterRepulsion / (centerDist + 0.1));
                uv += repulsion * 0.05;
              } else if (uMouseRepulsion) {
                vec2 mousePosUV = (uMouse * uResolution.xy - focalPx) / uResolution.y;
                float mouseDist = length(uv - mousePosUV);
                vec2 repulsion = normalize(uv - mousePosUV) * (uRepulsionStrength / (mouseDist + 0.1));
                uv += repulsion * 0.05 * uMouseActiveFactor;
              } else {
                vec2 mouseOffset = mouseNorm * 0.1 * uMouseActiveFactor;
                uv += mouseOffset;
              }

              // COMPLETELY FROZEN PARALLAX/STARS
              float autoRotAngle = 0.0;
              mat2 autoRot = mat2(cos(autoRotAngle), -sin(autoRotAngle), sin(autoRotAngle), cos(autoRotAngle));
              uv = autoRot * uv;
              uv = mat2(uRotation.x, -uRotation.y, uRotation.y, uRotation.x) * uv;

              vec3 col = vec3(0.0);
              for (float i = 0.0; i < 1.0; i += 1.0 / NUM_LAYER) {
                // Remove uSpeed/uStarSpeed entirely from depth shift. Use constant star coordinates.
                float depth = fract(i);
                float scale = mix(20.0 * uDensity, 0.5 * uDensity, depth);
                float fade = depth * smoothstep(1.0, 0.9, depth);
                col += StarLayer(uv * scale + i * 453.32) * fade;
              }

              if (uTransparent) {
                float alpha = length(col);
                alpha = smoothstep(0.0, 0.3, alpha);
                alpha = min(alpha, 1.0);
                gl_FragColor = vec4(col, alpha);
              } else {
                gl_FragColor = vec4(col, 1.0);
              }
            }`;

            nxProgram = new ogl.Program(nxGl, {
                vertex: vertexShader,
                fragment: fragmentShader,
                uniforms: {
                    uTime: { value: 0 },
                    uResolution: { value: new Float32Array([1, 1, 1]) },
                    uFocal: { value: new Float32Array([0.5, 0.5]) },
                    uRotation: { value: new Float32Array([1.0, 0.0]) },
                    uStarSpeed: { value: 0.0 }, // FROZEN
                    uDensity: { value: 0.1 }, // HIGHLY SPARSE
                    uHueShift: { value: 140.0 },
                    uSpeed: { value: 0.0 }, // FROZEN
                    uMouse: { value: new Float32Array([0.5, 0.5]) },
                    uGlowIntensity: { value: 0.3 },
                    uSaturation: { value: 0.0 },
                    uMouseRepulsion: { value: true },
                    uTwinkleIntensity: { value: 0.0 }, // STATIC NO TWINKLE
                    uRotationSpeed: { value: 0.0 },
                    uRepulsionStrength: { value: 2.0 },
                    uMouseActiveFactor: { value: 0.0 },
                    uAutoCenterRepulsion: { value: 0.0 },
                    uTransparent: { value: true }
                }
            });

            nxMesh = new ogl.Mesh(nxGl, { geometry: nxGeometry, program: nxProgram });

            container.addEventListener('mousemove', onNXMouseMove);
            container.addEventListener('mouseleave', onNXMouseLeave);
            window.addEventListener('resize', onNXResize, false);
            onNXResize();

            // Minimalist Render Loop just to process the mouse interactions seamlessly
            const loop = () => {
                nxRafId = requestAnimationFrame(loop);

                if (nxProgram) {
                    const lerpFactor = 0.05;
                    nxSmoothMousePos.x += (nxTargetMousePos.x - nxSmoothMousePos.x) * lerpFactor;
                    nxSmoothMousePos.y += (nxTargetMousePos.y - nxSmoothMousePos.y) * lerpFactor;
                    nxSmoothMouseActive += (nxTargetMouseActive - nxSmoothMouseActive) * lerpFactor;

                    nxProgram.uniforms.uMouse.value[0] = nxSmoothMousePos.x;
                    nxProgram.uniforms.uMouse.value[1] = nxSmoothMousePos.y;
                    nxProgram.uniforms.uMouseActiveFactor.value = nxSmoothMouseActive;

                    nxRenderer.render({ scene: nxMesh });
                }
            };
            nxRafId = requestAnimationFrame(loop);
        }

        function onNXMouseMove(e) {
            const container = document.getElementById('world-nexus');
            if (!container) return;
            const rect = container.getBoundingClientRect();
            nxTargetMousePos.x = (e.clientX - rect.left) / rect.width;
            nxTargetMousePos.y = 1.0 - ((e.clientY - rect.top) / rect.height);
            nxTargetMouseActive = 1.0;
        }

        function onNXMouseLeave() {
            nxTargetMouseActive = 0.0;
        }

        function onNXResize() {
            const container = document.getElementById('world-nexus');
            if (!container || !nxRenderer || !nxProgram) return;
            const width = typeof container.offsetWidth === 'number' ? container.offsetWidth : window.innerWidth;
            const height = typeof container.offsetHeight === 'number' ? container.offsetHeight : window.innerHeight;
            nxRenderer.setSize(width, height);
            nxProgram.uniforms.uResolution.value[0] = nxGl.canvas.width;
            nxProgram.uniforms.uResolution.value[1] = nxGl.canvas.height;
            nxProgram.uniforms.uResolution.value[2] = nxGl.canvas.width / nxGl.canvas.height;
        }

        // Continual explicit check to bootstrap via the dynamically imported ES module 
        let nexusInitInterval = setInterval(() => {
            if (window.ogl && window.ogl.Renderer) {
                initNexusGalaxy();
                clearInterval(nexusInitInterval);
            }
        }, 100);

    </script>

    <!-- Shooting Stars Engine -->
    <script>
        (function () {
            const canvas = document.getElementById('shooting-stars');
            if (!canvas) return;
            const ctx = canvas.getContext('2d', { alpha: true });

            let width = window.innerWidth;
            let height = window.innerHeight;

            function resize() {
                width = window.innerWidth;
                height = window.innerHeight;
                canvas.width = width;
                canvas.height = height;
            }
            window.addEventListener('resize', resize);
            resize();

            const minSpeed = 10;
            const maxSpeed = 30;
            const minDelay = 1200;
            const maxDelay = 4200;
            const starWidth = 10;
            const starHeight = 1; // Thin trail

            const activeStars = [];

            function getRandomStartPoint() {
                const side = Math.floor(Math.random() * 4);
                const offset = Math.random() * window.innerWidth;
                const hOffset = Math.random() * window.innerHeight;

                switch (side) {
                    case 0: return { x: offset, y: 0, angle: 45 };          // Top
                    case 1: return { x: window.innerWidth, y: hOffset, angle: 135 }; // Right
                    case 2: return { x: offset, y: window.innerHeight, angle: 225 }; // Bottom
                    case 3: return { x: 0, y: hOffset, angle: 315 };        // Left
                    default: return { x: 0, y: 0, angle: 45 };
                }
            }

            // A single Render Loop processes all stars efficiently
            function renderLoop() {
                // Clear entire canvas completely transparently
                ctx.clearRect(0, 0, width, height);

                // Iterate backwards to allow safe removal of array elements upon array death
                for (let i = activeStars.length - 1; i >= 0; i--) {
                    const star = activeStars[i];

                    // Update physics mathematically exactly the same
                    star.x += star.speed * Math.cos((star.angle * Math.PI) / 180);
                    star.y += star.speed * Math.sin((star.angle * Math.PI) / 180);
                    star.distance += star.speed;
                    star.scale = 1 + (star.distance / 100);

                    const currentWidth = starWidth * star.scale;

                    // Bounds Check
                    if (
                        star.x < -100 ||
                        star.x > width + 100 ||
                        star.y < -100 ||
                        star.y > height + 100
                    ) {
                        activeStars.splice(i, 1);
                        continue;
                    }

                    // Render to Canvas
                    ctx.save();

                    const cx = star.x + (currentWidth / 2);
                    const cy = star.y + (starHeight / 2);

                    ctx.translate(cx, cy);
                    ctx.rotate((star.angle * Math.PI) / 180);
                    ctx.translate(-cx, -cy);

                    // Golden exact gradient match (#FFD700)
                    const gradient = ctx.createLinearGradient(star.x, star.y, star.x + currentWidth, star.y);
                    gradient.addColorStop(0, "rgba(255, 215, 0, 1)");
                    gradient.addColorStop(1, "rgba(255, 215, 0, 0)");

                    ctx.fillStyle = gradient;
                    ctx.fillRect(star.x, star.y, currentWidth, starHeight);

                    ctx.restore();
                }

                requestAnimationFrame(renderLoop);
            }
            // Central rendering heartbeat
            requestAnimationFrame(renderLoop);

            function createStar() {
                const { x, y, angle } = getRandomStartPoint();

                // Track properties natively rather than writing attributes to SVG DOM Elements
                activeStars.push({
                    x, y, angle, scale: 1,
                    speed: Math.random() * (maxSpeed - minSpeed) + minSpeed,
                    distance: 0
                });

                // Tab timeout idling inherently guarantees 0 visual differences since these bursts will naturally enqueue identically
                setTimeout(createStar, Math.random() * (maxDelay - minDelay) + minDelay);
            }

            // Prime the sequence
            createStar();
        })();

        // --- Business Grid Generator ---
        // Generates a static SVG grid + random animated squares
        function initBusinessGrid() {
            const container = document.getElementById('business-grid');
            if (!container) return;

            const width = 40; // Spacing
            const height = 40;

            // Create SVG
            const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
            svg.setAttribute("width", "100%");
            svg.setAttribute("height", "100%");
            svg.setAttribute("xmlns", "http://www.w3.org/2000/svg");

            // Define Pattern
            const defs = document.createElementNS("http://www.w3.org/2000/svg", "defs");
            const pattern = document.createElementNS("http://www.w3.org/2000/svg", "pattern");
            pattern.setAttribute("id", "grid-pattern");
            pattern.setAttribute("width", width);
            pattern.setAttribute("height", height);
            pattern.setAttribute("patternUnits", "userSpaceOnUse");

            const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
            path.setAttribute("d", `M.5 ${height}V.5H${width}`);
            path.setAttribute("fill", "none");
            path.setAttribute("stroke", "rgba(255, 255, 255, 0.1)");
            path.setAttribute("stroke-width", "1");

            pattern.appendChild(path);
            defs.appendChild(pattern);
            svg.appendChild(defs);

            // Base Grid Rect
            const rect = document.createElementNS("http://www.w3.org/2000/svg", "rect");
            rect.setAttribute("width", "100%");
            rect.setAttribute("height", "100%");
            rect.setAttribute("fill", "url(#grid-pattern)");
            svg.appendChild(rect);

            // Random flickering squares
            const isMobile = window.innerWidth <= 768;
            const numSquares = isMobile ? 60 : 25; // Increase significantly for mobile coverage
            // Dynamic rows/cols based on viewport
            const maxCols = Math.ceil(window.innerWidth / width);
            const maxRows = Math.ceil(window.innerHeight / height);

            for (let i = 0; i < numSquares; i++) {
                const sq = document.createElementNS("http://www.w3.org/2000/svg", "rect");
                sq.classList.add('grid-square');
                sq.setAttribute("width", width - 1);
                sq.setAttribute("height", height - 1);

                // Use dynamic limits
                const col = Math.floor(Math.random() * maxCols);
                const row = Math.floor(Math.random() * maxRows);

                sq.setAttribute("x", (col * width) + 1);
                sq.setAttribute("y", (row * height) + 1);

                // Randomize animation delay via style
                sq.style.animationDelay = `${Math.random() * 5}s`;
                sq.style.animationDuration = `${3 + Math.random() * 3}s`;

                svg.appendChild(sq);
            }

            container.appendChild(svg);
        }

        // Initialize immediately
        initBusinessGrid();

    </script>

    <!-- Gyroscope Logic -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const gateway = document.getElementById('permission-gateway');
            const btnUnlock = document.getElementById('btn-unlock-motion');

            // Only show on mobile devices (or we could detect if DeviceOrientation is available)
            const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

            // For now, always check if we need permission on iOS 13+
            if (isMobile) {
                if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                    // Show gateway to get user gesture
                    setTimeout(() => {
                        gateway.classList.remove('hidden');
                        gateway.classList.add('slide-up');
                    }, 1000);
                } else {
                    // Not iOS 13+, just start listening or the browser already allows it
                    // Or we could show it anyway for consistency? The prompt says:
                    // "Clicking this serves as the required user gesture to unlock the phone's gyroscope."
                    // Let's show it on all mobile to be safe.
                    setTimeout(() => {
                        gateway.classList.remove('hidden');
                        gateway.classList.add('slide-up');
                    }, 1000);
                }
            }

            let baselineBeta = null;
            let baselineGamma = null;

            btnUnlock.addEventListener('click', async () => {
                try {
                    // Try to request explicit permission if available (iOS 13+)
                    if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                        const permissionState = await DeviceOrientationEvent.requestPermission();
                        if (permissionState === 'granted') {
                            window.addEventListener('deviceorientation', handleOrientation);
                        }
                    } else {
                        // Non iOS 13+ devices
                        window.addEventListener('deviceorientation', handleOrientation);
                    }
                } catch (error) {
                    console.warn("Device orientation permission error or denied", error);
                }

                // Hide gateway
                gateway.classList.remove('slide-up');
                gateway.classList.add('slide-down');
                setTimeout(() => gateway.classList.add('hidden'), 500); // Wait for transition
            });

            // Task 2: Passive gyroscope handling for micro-movements (Optimized)
            let lastGamma = null;
            let lastBeta = null;

            function handleOrientation(event) {
                // Do not apply drift if currently warping to a destination
                if (document.body.classList.contains('warping')) return;

                let gamma = event.gamma; // Left-to-right tilt in degrees [-90, 90]
                let beta = event.beta;   // Front-to-back tilt in degrees [-180, 180]

                if (gamma === null || beta === null) return;

                // Jump protection: if device crosses Euler boundaries (+90 to -90, or +180 to -180), or glitches
                if (lastGamma !== null && lastBeta !== null) {
                    if (Math.abs(gamma - lastGamma) > 40 || Math.abs(beta - lastBeta) > 40) {
                        // Massive jump detected! Offset the baseline by the jump amount 
                        // so the actual visual delta remains mathematically perfectly identical.
                        // This prevents any visual "snap" or "recentering" glitch.
                        if (baselineBeta !== null && baselineGamma !== null) {
                            baselineBeta += (beta - lastBeta);
                            baselineGamma += (gamma - lastGamma);
                        }
                    }
                }
                lastGamma = gamma;
                lastBeta = beta;

                // Calibrate the "center" immediately after permission is granted
                if (baselineBeta === null) {
                    baselineBeta = beta;
                    baselineGamma = gamma;
                }

                // Calculate the delta (movement relative to starting position)
                let deltaBeta = beta - baselineBeta;
                let deltaGamma = gamma - baselineGamma;

                // Constrain the delta slightly to avoid extreme screen flips
                deltaBeta = Math.max(-25, Math.min(25, deltaBeta));
                deltaGamma = Math.max(-25, Math.min(25, deltaGamma));

                // Set targets for LERP (We use rotateY and rotateX for that "looking around" feel)
                targetMouseRotX = -deltaBeta * 0.15; // deg
                targetMouseRotY = deltaGamma * 0.15; // deg
            }
        });
    </script>
